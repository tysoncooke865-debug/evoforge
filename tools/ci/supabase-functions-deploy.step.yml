# PARKED CI STEP — paste into .github/workflows/client.yml, end of the `deploy` job.
#
# WHY PARKED: this session's git/gh tokens lack the `workflow` OAuth scope, so a
# push touching .github/workflows/ is rejected by GitHub. Unlock either by:
#   gh auth refresh -h github.com -s workflow     (interactive, once)
# or by pasting this block in the GitHub web editor.
#
# WHAT IT DOES: with the SUPABASE_ACCESS_TOKEN repo secret set (Settings →
# Secrets → Actions; token from supabase.com/dashboard/account/tokens), every
# edge function under supabase/functions/ deploys on push — the additive
# skip-clean pattern the Cloudflare steps already use. This is the durable fix
# for "the function sat committed but undeployed" (ai-plan-scan, 2026-07-15).
# Optional repo VARIABLE: SUPABASE_PROJECT_REF (defaults to the prod ref).

      - name: Check Supabase deploy secrets
        id: sbgate
        env:
          SB_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$SB_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "SUPABASE_ACCESS_TOKEN not configured; skipping edge function deploy."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.sbgate.outputs.ok == 'true'

      - uses: supabase/setup-cli@v1
        if: steps.sbgate.outputs.ok == 'true'
        with:
          version: latest

      - name: Deploy edge functions
        if: steps.sbgate.outputs.ok == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'rysbpwpvnqbngqncrfaa' }}
        run: |
          set -o pipefail
          export SUPABASE_ACCESS_TOKEN=$(printf '%s' "$SUPABASE_ACCESS_TOKEN" | tr -d '"'"'"' \t\r\n')
          failed=0
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [ "$fn" = "_shared" ] && continue
            if supabase functions deploy "$fn" --project-ref "$PROJECT_REF" 2>&1 | tee "/tmp/fn-$fn.log"; then
              echo "deployed: $fn" >> "$GITHUB_STEP_SUMMARY"
            else
              grep -iE 'error|unauthorized|invalid|denied' "/tmp/fn-$fn.log" | head -n 3 \
                | while IFS= read -r line; do echo "::error title=supabase functions deploy ${fn}::${line}"; done
              failed=1
            fi
          done
          exit $failed
