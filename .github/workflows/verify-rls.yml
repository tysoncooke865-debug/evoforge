# Row-level security check, against a real database.
#
# SEPARATE from verify.yml on purpose. Two reasons:
#
#   1. It needs secrets. Pull requests from forks cannot read repository secrets,
#      so a job that needs them would fail on every fork PR for reasons that have
#      nothing to do with the PR. Ordinary contributions must not be gated on it.
#   2. It talks to a live project. That is a deliberate act, not something that
#      should fire on every push.
#
# `workflow_dispatch` only: you run it, from the Actions tab.
#
# ############################################################################
# #  POINT THE SECRETS AT STAGING, NEVER PRODUCTION.                         #
# #                                                                          #
# #  Only `--anon-only` runs here. It is read-only and writes nothing. The   #
# #  full test signs up two accounts and writes a row to all 12 tables --    #
# #  it must never run against a project holding real users' data.          #
# ############################################################################
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL   https://<staging-ref>.supabase.co
#   SUPABASE_KEY   staging's PUBLISHABLE key -- the one the app connects with.
#                  Not the secret/service-role key: that bypasses RLS entirely,
#                  so a test using it would prove nothing about what a stranger
#                  can read.
#
# Note the acceptance criterion is not "it exited 0". `--anon-only` reads zero
# rows from an empty database too, and zero rows is not a denial when there are
# zero rows. Point it at a project that HAS rows, or the green means nothing.

name: verify-rls

on:
  workflow_dispatch:

jobs:
  anon-only:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refuse to run without secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "SUPABASE_URL / SUPABASE_KEY are not set."
            echo "An unconfigured run must fail loudly, not pass quietly."
            exit 1
          fi

      # SUPABASE_SECRET_KEY is the POSITIVE CONTROL. It bypasses RLS, so the check
      # can prove which tables hold rows before concluding that a stranger reading
      # zero from them is a denial. Without it `--anon-only` exits 2 INCONCLUSIVE --
      # correctly, because an empty database also reads empty.
      #
      # It is used ONLY here, only to read, and only against staging. It must never
      # be placed in .streamlit/secrets.toml (see T4) or handed to the app.
      - name: verify_rls --anon-only (read-only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python tools/verify_rls.py --anon-only
