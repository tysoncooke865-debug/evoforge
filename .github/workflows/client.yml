# Expo client CI (MIGRATION_PLAN Phase 0) + the cross-language fixture guard.
#
# Two jobs on purpose, two runtimes: the TS side proves the client builds and
# its tokens match the design system; the Python side proves the goldens in
# contracts/fixtures/ still match the live domain/. When Phase 1's Vitest
# parity suite lands it joins the client job, closing the loop the plan calls
# "CI runs both sides (detects Python drift AND port drift)".
#
# Deploys are additive: pushes deploy to Cloudflare Pages IF the repo secrets
# exist, and skip cleanly if they do not -- CI stays green before the account
# is wired up. Preview URL per branch; `main` is the production branch (the
# domain still points at Streamlit until cutover, so deploying main is inert).
#
# Required repo secrets for deploys (Settings -> Secrets -> Actions):
#   CLOUDFLARE_API_TOKEN        Account -> Cloudflare Pages -> Edit
#   CLOUDFLARE_ACCOUNT_ID       dashboard sidebar
#   EXPO_PUBLIC_SUPABASE_URL    same value as .streamlit/secrets.toml SUPABASE_URL
#   EXPO_PUBLIC_SUPABASE_KEY    the PUBLISHABLE key only. Never the secret key:
#                               EXPO_PUBLIC_ values compile into the shipped bundle.

name: client

on:
  # Manual runs from the Actions tab -- rerunning a deploy after a secrets fix
  # should not require inventing a commit.
  workflow_dispatch:
  push:
    paths:
      - "client/**"
      - "supabase/**"
      - "contracts/**"
      - "tools/gen_fixtures.py"
      - "domain/**"
      - "config/constants.py"
      - "assets/styles.css"
      - ".github/workflows/client.yml"
  pull_request:
    paths:
      - "client/**"
      - "supabase/**"
      - "contracts/**"
      - "tools/gen_fixtures.py"
      - "domain/**"
      - "config/constants.py"
      - "assets/styles.css"
      - ".github/workflows/client.yml"

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      # Fall back to placeholders so PRs (and pre-Cloudflare pushes) still
      # exercise the full export. supabase.ts only requires the vars to be
      # non-empty; nothing dials out during static render. Real values are
      # required only for a build that will actually be deployed.
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY || 'sb_publishable_placeholder' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      # Fail fast, with an actionable message, when a secret was pasted with
      # decoration (quotes, or the whole NAME="value" line). Prints derived
      # properties only -- lengths and booleans -- never the value itself.
      - name: Validate Supabase env shape
        run: |
          node -e '
            const u = process.env.EXPO_PUBLIC_SUPABASE_URL || "";
            const k = process.env.EXPO_PUBLIC_SUPABASE_KEY || "";
            const um = u.match(/https?:\/\/[^\s"'"'"']+/);
            const report = (name, v, ok, hint) => {
              const msg = `${name}: len=${v.length} startsHttps=${v.startsWith("https://")} hasQuotes=${/["'\'']/.test(v)} hasEquals=${v.includes("=")}`;
              if (ok) console.log("OK  " + msg);
              else console.log(`::warning title=${name}::${msg} -- ${hint} (the client extracts the value anyway, but re-enter the secret as the bare value)`);
            };
            report("EXPO_PUBLIC_SUPABASE_URL", u, !!um && um[0] === u, "should be exactly https://<ref>.supabase.co");
            report("EXPO_PUBLIC_SUPABASE_KEY", k, /^sb_publishable_[A-Za-z0-9_-]+$/.test(k) || /^eyJ/.test(k), "should be exactly the publishable key, no quotes or NAME= prefix");
            if (!um) { console.log("::error title=EXPO_PUBLIC_SUPABASE_URL::contains no URL at all -- export cannot succeed"); process.exit(1); }
          '

      - name: verify-tokens — tokens.js equals assets/styles.css :root, both directions
        run: node scripts/verify-tokens.mjs

      - name: verify-battle-engine — client and server scoring are byte-identical
        run: node scripts/verify-battle-engine.mjs

      - name: verify-glicko — preview and settle rating maths are byte-identical
        run: node scripts/verify-glicko.mjs

      # TRANSFORM P8. withRepeat is Reanimated's only looping primitive, so a
      # component that loops without consulting useReducedMotion is exactly the
      # a11y bug this catches. It found two on the day it was written (the
      # toast's XP pulse and the HEADS OR TAILS coin), and it was falsified by
      # deleting a gate and watching it go red.
      - name: verify-motion — every ambient loop honours reduced motion
        run: node scripts/verify-motion.mjs

      # Premium program P2: the arena's deterministic engine must stay pure
      # TS (no react/react-native/expo/zustand imports) — rendering derives
      # from engine state, never the other way round. Falsified 2026-07-23.
      - name: verify-arena-purity — arena game-engine imports no UI
        run: node scripts/verify-arena-purity.mjs

      # Arena 2.0 P0: every imported champion's AutoSprite animation metadata
      # must satisfy the runtime contract (128px cells, required clips, feet
      # anchors in tolerance, sheets present + sized). Falsified 2026-07-24.
      - name: verify-arena-anim — champion animation atlases are consistent
        run: node scripts/verify-arena-anim.mjs

      - name: Parity suite — TS domain reproduces every golden case exactly
        run: npx vitest run src/domain

      - name: Lint — includes react/no-danger as an error
        run: npx expo lint

      # Export before tsc: expo-env.d.ts and .expo/types/router.d.ts are
      # generated (and gitignored), so a bare tsc on a fresh checkout is red.
      # On failure the log tail is emitted as ::error:: workflow commands --
      # those surface as check-run annotations, which are readable through the
      # public API without authentication (raw step logs are not).
      - name: Export web build
        run: |
          set -o pipefail
          if ! npx expo export -p web 2>&1 | tee /tmp/export.log; then
            # Annotations cap at 10/step; spend them on message lines, not
            # minified stack frames ("    at a (...)").
            grep -vE '^\s+at ' /tmp/export.log | grep -iE 'error|cannot|unable|failed|invalid|missing' | head -n 9 | while IFS= read -r line; do
              echo "::error title=expo export::${line}"
            done
            exit 1
          fi

      # expo-env.d.ts is generated by `expo start`, NOT by `expo export` -- on a
      # fresh checkout tsc fails on the @/global.css side-effect import without
      # it (this was the first CI failure). Its content is one static line.
      - name: Ensure generated type shims exist
        run: |
          [ -f expo-env.d.ts ] || printf '/// <reference types="expo/types" />\n' > expo-env.d.ts

      - name: Typecheck
        run: |
          set -o pipefail
          if ! npx tsc --noEmit 2>&1 | tee /tmp/tsc.log; then
            head -n 25 /tmp/tsc.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error title=tsc::${line}"
            done
            exit 1
          fi

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: client/dist
          retention-days: 7

  # TRANSFORM P8 — the Lighthouse release gate. Runs against the SAME artifact
  # the deploy ships, so the number is the build's, not a rebuild's.
  #
  # Deliberately NOT in `deploy: needs:`. Lighthouse is a lab measurement on a
  # shared runner: it can flake (Chrome trace/launch errors) in a way the unit
  # gates cannot, and a flaky blocker gets deleted within a week. Instead it is
  # its own required-visible check — a regression turns the commit red and
  # nobody can miss it, but a bad Chrome launch cannot wedge a good deploy.
  # The budgets in client/lighthouserc.json are ratchets under the measured
  # build; raise them when the build clears them, never lower them to go green.
  lighthouse:
    needs: [client]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: client/dist

      - name: Lighthouse CI — budgets in client/lighthouserc.json
        run: |
          set -o pipefail
          if ! npx --yes @lhci/cli@0.14.x autorun 2>&1 | tee /tmp/lhci.log; then
            grep -iE 'assertion|expected:|found:|minScore|maxNumericValue' /tmp/lhci.log \
              | head -n 9 \
              | while IFS= read -r line; do echo "::error title=lighthouse::${line}"; done
            exit 1
          fi
          {
            echo "### Lighthouse"
            grep -E '^\s+(⚠️|❌|✅)' /tmp/lhci.log || echo "all budgets met"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: client/.lighthouseci
          retention-days: 7

  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: gen_fixtures --check — goldens match the live Python domain
        run: python tools/gen_fixtures.py --check

  deploy:
    # Push or manual dispatch (fork PRs cannot read secrets), after both check jobs.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [client, fixtures]
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check deploy secrets
        id: gate
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "deploy secrets present"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "Cloudflare secrets not configured; skipping deploy (checks above still gate)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.ok == 'true'
        with:
          name: web-dist
          path: dist

      # Plain wrangler instead of wrangler-action: the action swallows the CLI's
      # error text, and anonymous API access can only read annotations. On
      # failure the wrangler messages are replayed as ::error:: lines (sans
      # stack frames), same pattern as the export/tsc steps.
      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          # Strip paste decoration (quotes/whitespace) -- tokens and account ids
          # never legitimately contain either. Then verify the token BEFORE
          # deploying, so a bad credential produces one actionable message
          # instead of four wrangler stack dumps.
          export CLOUDFLARE_API_TOKEN=$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '"'"'"' \t\r\n')
          export CLOUDFLARE_ACCOUNT_ID=$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | tr -d '"'"'"' \t\r\n')
          verify=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)
          if ! echo "$verify" | grep -q '"success":\s*true'; then
            echo "::error title=CLOUDFLARE_API_TOKEN::Cloudflare rejected the token (after stripping quotes/whitespace). Re-create it: dash.cloudflare.com -> profile -> API Tokens -> Create Token -> 'Edit Cloudflare Workers' template (or custom with Account > Cloudflare Pages > Edit). It must be an API TOKEN, not the Global API Key, pasted bare."
            exit 1
          fi
          echo "token verified OK"
          npx --yes wrangler pages project create evoforge --production-branch=main 2>&1 | tee /tmp/create.log || true
          if ! npx --yes wrangler pages deploy dist --project-name=evoforge --branch="${{ github.ref_name }}" 2>&1 | tee /tmp/deploy.log; then
            cat /tmp/create.log /tmp/deploy.log \
              | grep -vE '^\s+at ' \
              | grep -iE 'error|unauthorized|forbidden|not found|invalid|denied|missing' \
              | head -n 9 \
              | while IFS= read -r line; do echo "::error title=wrangler::${line}"; done
            exit 1
          fi
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          grep -oE 'https://[a-z0-9.-]*pages\.dev[^" ]*' /tmp/deploy.log | sort -u | tee -a "$GITHUB_STEP_SUMMARY"

      # Edge functions ride the same push (SUPABASE_SETUP.md step 3, wired
      # 2026-07-15). Gated on its own secret, skip-clean like the CF steps.
      - name: Check Supabase deploy secrets
        id: sbgate
        env:
          SB_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$SB_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "SUPABASE_ACCESS_TOKEN not configured; skipping edge function deploy."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.sbgate.outputs.ok == 'true'

      - uses: supabase/setup-cli@v1
        if: steps.sbgate.outputs.ok == 'true'
        with:
          version: latest

      - name: Deploy edge functions
        if: steps.sbgate.outputs.ok == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'rysbpwpvnqbngqncrfaa' }}
        run: |
          set -o pipefail
          export SUPABASE_ACCESS_TOKEN=$(printf '%s' "$SUPABASE_ACCESS_TOKEN" | tr -d '"'"'"' \t\r\n')
          failed=0
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [ "$fn" = "_shared" ] && continue
            if supabase functions deploy "$fn" --project-ref "$PROJECT_REF" 2>&1 | tee "/tmp/fn-$fn.log"; then
              echo "deployed: $fn" >> "$GITHUB_STEP_SUMMARY"
            else
              grep -iE 'error|unauthorized|invalid|denied' "/tmp/fn-$fn.log" | head -n 3 \
                | while IFS= read -r line; do echo "::error title=supabase functions deploy ${fn}::${line}"; done
              failed=1
            fi
          done
          exit $failed
