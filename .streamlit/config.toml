[theme]
base = "dark"
primaryColor = "#22d3ee"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#111a2e"
textColor = "#e6f0fa"
font = "sans serif"

[client]
toolbarMode = "minimal"
# Belt and braces. The page modules live in views/, not pages/, so Streamlit's
# multipage magic is already off -- a top-level pages/ dir made Streamlit build
# its own sidebar nav on top of ours, which read as a duplicated sidebar.
showSidebarNavigation = false
