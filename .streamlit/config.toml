[server]
# Serves files from `static/` at `app/static/<name>`. The ten avatar PNGs are
# 4.8 MB; inlined as base64 data-URIs they became ~6.4 MB of TEXT re-serialized
# into the DOM on every rerun -- and the Avatar page shows three at once. As URLs
# the browser fetches each once and caches it.
#
# They are generic art shipped with the repo, not user data, so public readability
# is fine. NEVER put anything user-derived in static/ -- it is world-readable.
#
# NOTE: Streamlit serves only .png/.jpg/.jpeg/.gif (plus fonts and pdf/xml/json)
# with an image content-type. A .webp lands as text/plain and will not render.
enableStaticServing = true

[theme]
base = "dark"
primaryColor = "#22d3ee"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#111a2e"
textColor = "#e6f0fa"
font = "sans serif"

[client]
toolbarMode = "minimal"
# Belt and braces. The page modules live in views/, not pages/, so Streamlit's
# multipage magic is already off -- a top-level pages/ dir made Streamlit build
# its own sidebar nav on top of ours, which read as a duplicated sidebar.
showSidebarNavigation = false
