<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CYBER ATHLETE — Animation Tester</title>
<style>
  :root {
    --bg: #07090f;
    --panel: #0d1120;
    --edge: #1c2440;
    --cyan: #35d5ff;
    --cyan-dim: #1a7fa0;
    --text: #cfe9f5;
    --hot: #ff3d6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #101a33 0%, var(--bg) 60%);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 18px 12px 40px;
  }
  h1 {
    font-family: Consolas, monospace; letter-spacing: 6px; font-size: 22px;
    color: var(--cyan); text-shadow: 0 0 12px rgba(53,213,255,.6);
    margin-bottom: 4px;
  }
  .sub { font-size: 11px; letter-spacing: 3px; color: #5a7a99; margin-bottom: 14px; }
  .cab {
    position: relative; border: 2px solid var(--edge); border-radius: 10px;
    box-shadow: 0 0 40px rgba(20,120,180,.25), inset 0 0 0 1px #000;
    overflow: hidden; background: #000;
  }
  canvas { display: block; image-rendering: pixelated; }
  .scanlines {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px);
    mix-blend-mode: multiply;
  }
  .controls { margin-top: 16px; width: 960px; max-width: 96vw; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; }
  button.act {
    font-family: Consolas, monospace; font-size: 13px; letter-spacing: 1px;
    color: var(--text); background: linear-gradient(#161f3a, var(--panel));
    border: 1px solid var(--edge); border-bottom: 3px solid #060a14;
    border-radius: 6px; padding: 9px 14px 7px; cursor: pointer; min-width: 86px;
  }
  button.act small { display: block; font-size: 9px; color: #57708c; letter-spacing: 2px; margin-top: 2px; }
  button.act:hover { border-color: var(--cyan-dim); color: #fff; }
  button.act.on {
    border-color: var(--cyan); color: var(--cyan);
    box-shadow: 0 0 12px rgba(53,213,255,.35), inset 0 0 8px rgba(53,213,255,.15);
    transform: translateY(1px); border-bottom-width: 2px;
  }
  button.act.hot { border-color: #58314a; }
  button.act.hot:hover, button.act.hot.on { border-color: var(--hot); color: var(--hot); box-shadow: 0 0 12px rgba(255,61,110,.3); }
  .sliders { display: flex; gap: 26px; justify-content: center; align-items: center; flex-wrap: wrap; margin-top: 4px; }
  .sliders label { font-family: Consolas, monospace; font-size: 11px; letter-spacing: 2px; color: #6f93b5; display: flex; gap: 8px; align-items: center; }
  input[type=range] { accent-color: var(--cyan); width: 130px; }
  .hint { text-align: center; font-size: 11px; color: #46607c; margin-top: 12px; letter-spacing: 1px; line-height: 1.7; }
  kbd { background: #131a2e; border: 1px solid var(--edge); border-radius: 3px; padding: 1px 5px; font-size: 10px; color: #9fc5e0; }
</style>
</head>
<body>
<h1>CYBER ATHLETE</h1>
<div class="sub">SPRITE ANIMATION TESTER — INSERT COIN</div>

<div class="cab">
  <canvas id="cv" width="960" height="540"></canvas>
  <div class="scanlines"></div>
</div>

<div class="controls">
  <div class="row" id="animBtns"></div>
  <div class="row">
    <button class="act" id="pauseBtn">PAUSE<small>P</small></button>
    <button class="act" id="stepBtn">STEP<small>.</small></button>
    <button class="act" id="flipBtn">FLIP<small>F</small></button>
    <button class="act" id="resetBtn">RESET<small>R</small></button>
  </div>
  <div class="sliders">
    <label>SPEED <input type="range" id="speed" min="10" max="300" value="100"> <span id="speedVal">1.0×</span></label>
    <label>ZOOM <input type="range" id="zoom" min="80" max="260" value="150"> <span id="zoomVal">1.5×</span></label>
  </div>
  <div class="hint">
    MOVE <kbd>←</kbd><kbd>→</kbd> &nbsp; RUN <kbd>SHIFT</kbd>+move &nbsp; JUMP <kbd>SPACE</kbd> &nbsp; CROUCH <kbd>↓</kbd> (hold)
    &nbsp; BLOCK <kbd>B</kbd> (hold)<br>
    PUNCH <kbd>J</kbd> &nbsp; KICK <kbd>K</kbd> &nbsp; SPECIAL <kbd>L</kbd> &nbsp; HURT <kbd>H</kbd> &nbsp; KO <kbd>O</kbd> &nbsp; VICTORY <kbd>V</kbd> &nbsp; IDLE <kbd>I</kbd>
  </div>
</div>

<script src="frames.js"></script>
<script>
"use strict";
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
ctx.imageSmoothingEnabled = false;

const sheet = new Image();
sheet.src = SHEET_SRC;

const GROUND = 470;
const WALK_SPEED = 130, RUN_SPEED = 320;

const st = {
  anim: "idle", frame: 0, acc: 0,
  x: cv.width / 2, facing: 1,
  paused: false, speedMul: 1, zoom: 1.5,
  hp: 1, shake: 0, flash: 0, t: 0,
  projectiles: [], stars: [],
};
for (let i = 0; i < 60; i++)
  st.stars.push({ x: Math.random() * 960, y: Math.random() * 360, z: 0.3 + Math.random() * 0.7 });

const keys = {};
// animations that must not be interrupted by movement until they finish
const BUSY = new Set(["punch", "kick", "special", "jump", "hurt", "ko", "victory"]);

function setAnim(name, force) {
  if (!force && st.anim === name) return;
  st.anim = name; st.frame = 0; st.acc = 0;
  if (name === "hurt") { st.hp = Math.max(0, st.hp - 0.15); st.flash = 0.25; st.shake = 8; }
  if (name === "ko") { st.hp = 0; st.shake = 12; }
  if (name === "victory") st.hp = 1;
  syncButtons();
}

function animDone() {           // a "once" animation finished
  if (st.anim === "special") {} // projectile already launched on cast frame 3
  setAnim(holdIntent() || "idle", true);
}

// what the held keys want, for when an action ends or nothing is playing
function holdIntent() {
  if (keys["b"]) return "block";
  if (keys["arrowdown"] || keys["s"]) return "crouch";
  if (keys["arrowleft"] || keys["a"] || keys["arrowright"] || keys["d"])
    return keys["shift"] ? "run" : "walk";
  return null;
}

function fireProjectile() {
  const f = ANIMS.special.frames[3];
  st.projectiles.push({
    x: st.x + st.facing * (f.w * st.zoom * 0.55),
    y: GROUND - 78 * st.zoom + 8,
    vx: 620 * st.facing, dir: st.facing, frame: 0, acc: 0,
  });
}

function update(dt) {
  st.t += dt;
  st.shake = Math.max(0, st.shake - dt * 40);
  st.flash = Math.max(0, st.flash - dt);

  const a = ANIMS[st.anim];
  st.acc += dt * a.fps * st.speedMul;
  while (st.acc >= 1) {
    st.acc -= 1;
    const last = a.frames.length - 1;
    if (st.frame < last) {
      st.frame++;
      if (st.anim === "special" && st.frame === 3) fireProjectile();
      if (st.anim === "jump" && st.frame === 2) st.shake = 3;
    } else if (a.mode === "loop") st.frame = 0;
    else if (a.mode === "once") { animDone(); break; }
    // hold: stay on last frame
  }

  // movement while walking / running (and drift during jump)
  const busy = BUSY.has(st.anim);
  const left = keys["arrowleft"] || keys["a"], right = keys["arrowright"] || keys["d"];
  if (left !== right && (!busy || st.anim === "jump")) {
    const dir = right ? 1 : -1;
    if (!busy) st.facing = dir;
    const sp = st.anim === "run" ? RUN_SPEED : WALK_SPEED;
    st.x = Math.max(70, Math.min(cv.width - 70, st.x + dir * sp * dt * st.speedMul));
  }
  if (!busy) {
    const want = holdIntent() || "idle";
    if (want !== st.anim) setAnim(want);
  }

  for (const p of st.projectiles) {
    p.x += p.vx * dt * st.speedMul;
    p.acc += dt * ANIMS.projectile.fps * st.speedMul;
    while (p.acc >= 1) { p.acc -= 1; p.frame = (p.frame + 1) % ANIMS.projectile.frames.length; }
  }
  st.projectiles = st.projectiles.filter(p => p.x > -160 && p.x < cv.width + 160);
}

function drawBackground() {
  ctx.fillStyle = "#05070d";
  ctx.fillRect(0, 0, 960, 540);
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
  grad.addColorStop(0, "#0a1226");
  grad.addColorStop(1, "#11224a");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, GROUND);

  ctx.fillStyle = "#9fd8ff";
  for (const s of st.stars) {
    const tw = 0.4 + 0.6 * Math.abs(Math.sin(st.t * s.z * 2 + s.x));
    ctx.globalAlpha = 0.5 * s.z * tw;
    ctx.fillRect(s.x, s.y, 2, 2);
  }
  ctx.globalAlpha = 1;

  // skyline blocks
  ctx.fillStyle = "#0d1830";
  for (let i = 0; i < 16; i++) {
    const w = 40 + (i * 37) % 70, h = 60 + (i * 53) % 150, x = i * 62 - 20;
    ctx.fillRect(x, GROUND - h - 40, w, h + 40);
    ctx.fillStyle = "rgba(53,213,255,.10)";
    for (let wy = GROUND - h - 28; wy < GROUND - 20; wy += 14)
      ctx.fillRect(x + 6, wy, w - 12, 4);
    ctx.fillStyle = "#0d1830";
  }

  // floor
  const fg = ctx.createLinearGradient(0, GROUND, 0, 540);
  fg.addColorStop(0, "#0e1c38");
  fg.addColorStop(1, "#060a14");
  ctx.fillStyle = fg;
  ctx.fillRect(0, GROUND, 960, 540 - GROUND);
  ctx.strokeStyle = "rgba(53,213,255,.8)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(960, GROUND); ctx.stroke();
  ctx.strokeStyle = "rgba(53,213,255,.18)";
  ctx.lineWidth = 1;
  const scroll = (st.t * 40) % 48;
  for (let x = -scroll; x < 1000; x += 48) {           // perspective verticals
    const cx0 = 480 + (x - 480) * 0.6;
    ctx.beginPath(); ctx.moveTo(cx0, GROUND); ctx.lineTo(x, 540); ctx.stroke();
  }
  for (let i = 1; i < 5; i++) {                        // horizontals
    const y = GROUND + Math.pow(i / 5, 1.7) * (540 - GROUND);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(960, y); ctx.stroke();
  }
}

function drawHud() {
  ctx.font = "bold 13px Consolas, monospace";
  ctx.fillStyle = "#35d5ff";
  ctx.fillText("CYBER ATHLETE", 24, 30);
  ctx.strokeStyle = "#1c2440"; ctx.lineWidth = 1;
  ctx.strokeRect(23.5, 39.5, 301, 15);
  ctx.fillStyle = "#0a0f1e";
  ctx.fillRect(25, 41, 298, 12);
  const hpw = 298 * st.hp;
  const hg = ctx.createLinearGradient(25, 0, 323, 0);
  hg.addColorStop(0, st.hp > 0.35 ? "#35d5ff" : "#ff3d6e");
  hg.addColorStop(1, st.hp > 0.35 ? "#7cf3ff" : "#ff7d9e");
  ctx.fillStyle = hg;
  ctx.fillRect(25, 41, hpw, 12);
  ctx.fillStyle = "#5a7a99";
  ctx.font = "11px Consolas, monospace";
  const a = ANIMS[st.anim];
  ctx.fillText(`ANIM ${st.anim.toUpperCase()}  FRAME ${st.frame + 1}/${a.frames.length}  ${a.fps} FPS  ${a.mode.toUpperCase()}`, 24, 72);
  ctx.textAlign = "right";
  ctx.fillStyle = "#35d5ff";
  ctx.font = "bold 13px Consolas, monospace";
  ctx.fillText("EVOFORGE LAB", 936, 30);
  ctx.textAlign = "left";
}

function draw() {
  ctx.save();
  if (st.shake > 0)
    ctx.translate((Math.random() - 0.5) * st.shake, (Math.random() - 0.5) * st.shake);

  drawBackground();

  // projectiles behind/in front doesn't matter much — draw before character shadow
  for (const p of st.projectiles) {
    const f = ANIMS.projectile.frames[p.frame];
    const w = f.w * st.zoom, h = f.h * st.zoom;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(p.dir, 1);
    ctx.drawImage(sheet, f.x, f.y, f.w, f.h, -w / 2, -h / 2, w, h);
    ctx.restore();
  }

  // shadow
  const cf = ANIMS[st.anim].frames[st.frame];
  const airborne = cf.dy > 4;
  ctx.fillStyle = "rgba(0,0,0,.5)";
  ctx.beginPath();
  ctx.ellipse(st.x, GROUND + 8, (cf.w * st.zoom) * (airborne ? 0.22 : 0.32), 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // character: feet on GROUND, dy lifts within the animation (jump arc, fist pump)
  const w = cf.w * st.zoom, h = cf.h * st.zoom;
  ctx.save();
  ctx.translate(st.x, GROUND);
  ctx.scale(st.facing, 1);
  ctx.drawImage(sheet, cf.x, cf.y, cf.w, cf.h, -w / 2, -(h + cf.dy * st.zoom), w, h);
  ctx.restore();

  if (st.flash > 0) {
    ctx.fillStyle = `rgba(255,61,110,${st.flash * 0.9})`;
    ctx.fillRect(0, 0, 960, 540);
  }
  drawHud();

  if (st.paused) {
    ctx.fillStyle = "rgba(0,0,0,.45)";
    ctx.fillRect(0, 0, 960, 540);
    ctx.fillStyle = "#35d5ff";
    ctx.font = "bold 26px Consolas, monospace";
    ctx.textAlign = "center";
    ctx.fillText("‖ PAUSED", 480, 270);
    ctx.textAlign = "left";
  }
  ctx.restore();
}

let prev = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - prev) / 1000);
  prev = now;
  if (!st.paused) update(dt);
  draw();
  requestAnimationFrame(frame);
}
sheet.onload = () => requestAnimationFrame(frame);

// ---- controls ----
const ORDER = ["idle", "walk", "run", "jump", "crouch", "block", "punch", "kick", "special", "hurt", "ko", "victory"];
const KEYHINT = { idle: "I", walk: "←→", run: "⇧+←→", jump: "SPACE", crouch: "↓", block: "B", punch: "J", kick: "K", special: "L", hurt: "H", ko: "O", victory: "V" };
const btnBox = document.getElementById("animBtns");
const btns = {};
for (const name of ORDER) {
  const b = document.createElement("button");
  b.className = "act" + (["hurt", "ko"].includes(name) ? " hot" : "");
  b.innerHTML = `${name.toUpperCase()}<small>${KEYHINT[name]}</small>`;
  b.onclick = () => { st.paused = false; setAnim(name, true); syncButtons(); };
  btnBox.appendChild(b);
  btns[name] = b;
}
function syncButtons() {
  for (const n of ORDER) btns[n].classList.toggle("on", st.anim === n);
  document.getElementById("pauseBtn").classList.toggle("on", st.paused);
}
syncButtons();

document.getElementById("pauseBtn").onclick = () => { st.paused = !st.paused; syncButtons(); };
document.getElementById("stepBtn").onclick = () => {
  st.paused = true; syncButtons();
  const a = ANIMS[st.anim];
  st.frame = (st.frame + 1) % a.frames.length;
  if (st.anim === "special" && st.frame === 3) fireProjectile();
  for (const p of st.projectiles) p.x += p.vx / a.fps;
  draw();
};
document.getElementById("flipBtn").onclick = () => { st.facing *= -1; };
document.getElementById("resetBtn").onclick = () => {
  st.x = cv.width / 2; st.facing = 1; st.hp = 1; st.projectiles = [];
  st.paused = false; setAnim("idle", true);
};

const speedEl = document.getElementById("speed"), zoomEl = document.getElementById("zoom");
speedEl.oninput = () => { st.speedMul = speedEl.value / 100; document.getElementById("speedVal").textContent = st.speedMul.toFixed(1) + "×"; };
zoomEl.oninput = () => { st.zoom = zoomEl.value / 100; document.getElementById("zoomVal").textContent = st.zoom.toFixed(1) + "×"; };

const TAP = { " ": "jump", j: "punch", k: "kick", l: "special", h: "hurt", o: "ko", v: "victory", i: "idle" };
window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if (["arrowleft", "arrowright", "arrowdown", "arrowup", " "].includes(k) || k === "b") e.preventDefault();
  if (k === "p") { st.paused = !st.paused; syncButtons(); return; }
  if (k === ".") { document.getElementById("stepBtn").onclick(); return; }
  if (k === "f") { st.facing *= -1; return; }
  if (k === "r") { document.getElementById("resetBtn").onclick(); return; }
  keys[k] = true;
  if (TAP[k] && !e.repeat && !BUSY.has(st.anim)) { st.paused = false; setAnim(TAP[k], true); }
  else if (TAP[k] && !e.repeat && ["hurt", "ko", "victory", "idle", " "].includes(k) === false) {} // busy: ignore taps
  if ((k === "arrowup" || k === "w") && !e.repeat && !BUSY.has(st.anim)) setAnim("jump", true);
});
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
window.addEventListener("blur", () => { for (const k in keys) keys[k] = false; });
</script>
</body>
</html>
